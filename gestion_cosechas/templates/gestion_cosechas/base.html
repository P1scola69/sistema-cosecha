{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CosechaWebb{% endblock %}</title>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'gestion_cosechas/img/favicon.ico' %}?v=2">
    <script src="{% static 'gestion_cosechas/js/jquery-4.0.0.min.js' %}"></script>
    <style>
        :root { --verde-primario: #27ae60; --azul-oscuro: #2c3e50; --texto-suave: #7f8c8d; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(-45deg, #f4f7f6, #eef5f3, #f9fbf9, #ffffff); background-size: 400% 400%; animation: gradientSuave 20s ease infinite; display: flex; min-height: 100vh; }
        @keyframes gradientSuave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .sidebar { width: 250px; background-color: var(--azul-oscuro); color: white; display: flex; flex-direction: column; padding: 20px; position: fixed; height: 100%; z-index: 100; }
        .logo-container { text-align: center; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .logo-container img { width: 70px; }
        .nav-link { color: rgba(255,255,255,0.8); text-decoration: none; padding: 12px; border-radius: 8px; display: block; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover { background: var(--verde-primario); transform: translateX(5px); color: white; }
        .main-content { margin-left: 290px; padding: 40px; width: calc(100% - 290px); }
        .form-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--verde-primario); }
        input, select { width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-guardar { background: var(--verde-primario); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-container">
            <img src="{% static 'gestion_cosechas/img/logo.png' %}" alt="Logo">
            <p style="font-size: 10px; color: #2ecc71; font-weight: bold; letter-spacing: 1px;">COSECHAWEBB</p>
        </div>
        <nav>
            <a href="/" class="nav-link">🏠 Inicio</a>
            <a href="/personal/supervisor/" class="nav-link">👔 Supervisores</a>
            <a href="/personal/cosechero/" class="nav-link">👨‍🌾 Cosecheros</a>
            <a href="/fundos/" class="nav-link">📍 Fundos</a>
            <a href="/formulario/" class="nav-link">🚜 Registro Kilos</a>
        </nav>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
